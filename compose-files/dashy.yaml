name: dashy

services:
  dashy:
    image: lissy93/dashy:latest
    container_name: dashy
    # volumes:
      # - /root/my-config.yml:/app/user-data/conf.yml # optional
    ports:
      - 8080:8080
    environment:
      - NODE_ENV=production
      - UID=1000
      - GID=1000
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck']
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
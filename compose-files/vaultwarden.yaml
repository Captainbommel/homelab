# wont work without https

# Environment Variables
#
# HOST 

name: vaultwarden

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: ${HOST}
    volumes:
      - ./vw-data/:/data/
    ports:
      - 80:80